<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Nemotron Tinker Architecture</title>
  <desc id="desc">A control plane and data plane diagram for the Nemotron Tinker service.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M2,2 L10,6 L2,10 Z" fill="#76b900"/>
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #f7f9f4; }
      .bg { fill: #111312; }
      .panel { fill: #1a1d1b; stroke: #303730; stroke-width: 2; }
      .box { fill: #222722; stroke: #76b900; stroke-width: 2; rx: 10; }
      .muted { fill: #b8c2b3; font-size: 17px; }
      .label { fill: #f7f9f4; font-size: 22px; font-weight: 700; }
      .small { fill: #c8d2c4; font-size: 15px; }
      .title { fill: #ffffff; font-size: 34px; font-weight: 800; }
      .section { fill: #76b900; font-size: 18px; font-weight: 800; letter-spacing: 1px; }
      .line { stroke: #76b900; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .softline { stroke: #8aa37a; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1200" height="720"/>
  <text class="title" x="60" y="62">Nemotron Tinker</text>
  <text class="muted" x="60" y="94">Tinker-style LoRA training and inference over one resident base model</text>

  <rect class="panel" x="44" y="126" width="1112" height="248" rx="18"/>
  <text class="section" x="70" y="162">CONTROL PLANE</text>

  <rect class="box" x="76" y="198" width="176" height="86"/>
  <text class="label" x="112" y="233">Operator UI</text>
  <text class="small" x="105" y="260">/ui workflow console</text>

  <rect class="box" x="76" y="304" width="176" height="44"/>
  <text class="label" x="117" y="334">Python SDK</text>

  <rect class="box" x="318" y="226" width="220" height="92"/>
  <text class="label" x="354" y="263">FastAPI Service</text>
  <text class="small" x="351" y="291">auth, jobs, tenants, routing</text>

  <rect class="box" x="604" y="176" width="206" height="70"/>
  <text class="label" x="646" y="219">SQLite Metadata</text>

  <rect class="box" x="604" y="270" width="206" height="70"/>
  <text class="label" x="623" y="313">Train Manifests</text>

  <rect class="box" x="878" y="222" width="220" height="88"/>
  <text class="label" x="917" y="257">Worker Manager</text>
  <text class="small" x="914" y="285">local worker records</text>

  <path class="line" d="M252 241 H318"/>
  <path class="softline" d="M252 326 H286 Q306 326 318 304"/>
  <path class="line" d="M538 252 C570 236 572 214 604 211"/>
  <path class="line" d="M538 294 C570 306 572 306 604 306"/>
  <path class="line" d="M810 266 H878"/>

  <rect class="panel" x="44" y="414" width="1112" height="246" rx="18"/>
  <text class="section" x="70" y="450">DATA PLANE</text>

  <rect class="box" x="82" y="500" width="222" height="86"/>
  <text class="label" x="118" y="535">MixedLora Client</text>
  <text class="small" x="119" y="562">batch grouping + losses</text>

  <rect class="box" x="382" y="472" width="220" height="78"/>
  <text class="label" x="424" y="506">Resident Base</text>
  <text class="small" x="435" y="532">loaded once on GPU</text>

  <rect class="box" x="382" y="576" width="220" height="58"/>
  <text class="label" x="422" y="613">LoRA Adapters</text>

  <rect class="box" x="686" y="464" width="202" height="74"/>
  <text class="label" x="719" y="498">SFT Updates</text>
  <text class="small" x="729" y="522">cross entropy</text>

  <rect class="box" x="686" y="562" width="202" height="74"/>
  <text class="label" x="719" y="596">RL Updates</text>
  <text class="small" x="713" y="620">IS, PPO, CISPO, DRO</text>

  <rect class="box" x="966" y="504" width="146" height="82"/>
  <text class="label" x="1001" y="539">Sample</text>
  <text class="small" x="996" y="565">adapter inference</text>

  <path class="line" d="M428 318 V390 Q428 414 304 514"/>
  <path class="line" d="M304 532 H382"/>
  <path class="softline" d="M304 560 C340 602 342 606 382 606"/>
  <path class="line" d="M602 510 H686"/>
  <path class="softline" d="M602 606 H686"/>
  <path class="line" d="M888 501 C930 501 934 522 966 536"/>
  <path class="softline" d="M888 599 C930 599 934 574 966 556"/>

  <text class="small" x="70" y="684">Current V1 scope: single-node service with async jobs, tenant scoping, SQLite metadata, file-backed train payloads, and resident adapter routing.</text>
</svg>
